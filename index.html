<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 GitHub AI 助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-container { height: calc(100vh - 180px); }
        .user-msg { background-color: #2563eb; color: white; border-radius: 1rem 1rem 0 1rem; }
        .ai-msg { background-color: white; color: #1f2937; border-radius: 1rem 1rem 1rem 0; border: 1px solid #e5e7eb; shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="bg-gray-50 flex flex-col h-screen font-sans">

    <header class="bg-white border-b border-gray-200 py-4 px-6 flex justify-between items-center">
        <h1 class="text-xl font-bold text-blue-600 tracking-tight">AI Assistant</h1>
        <span class="text-xs text-gray-400">Powered by DeepSeek / OpenAI</span>
    </header>

    <main id="chat-box" class="chat-container overflow-y-auto p-4 md:p-8 space-y-6 flex-1">
        <div class="flex justify-start">
            <div class="ai-msg px-4 py-3 max-w-[85%] shadow-sm">
                你好！我已经准备好为你服务了。请输入你的问题。
            </div>
        </div>
    </main>

    <footer class="p-4 bg-white border-t border-gray-200">
        <div class="max-w-4xl mx-auto flex gap-3">
            <input type="text" id="user-input" placeholder="输入消息..." 
                class="flex-1 border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            <button onclick="sendMessage()" 
                class="bg-blue-600 text-white px-6 py-3 rounded-xl hover:bg-blue-700 font-medium transition-colors shadow-lg active:scale-95">
                发送
            </button>
        </div>
        <p class="text-center text-[10px] text-gray-400 mt-2">请确保已在代码中配置有效的 API Key</p>
    </footer>

    <script>
        // --- 配置区 ---
        // 确保引号内没有多余空格，且是标准的英文引号
        const API_KEY = "sk_6HhkonZBrVXqGMWdZWKGWGdyb3FYkU3WfyqIbkXGVDDO6ch84vil; 
        const API_URL = "https://api.deepseek.com/v1/chat/completions"; 

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // 1. 显示用户消息
            appendMessage('user', text);
            userInput.value = '';

            // 2. 显示 AI 正在思考的状态
            const aiMsgDiv = appendMessage('ai', "正在思考中...");

            try {
                // 3. 发起请求
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        // 使用标准的拼接方式避免编码问题
                        "Authorization": "Bearer " + API_KEY
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat", // 如果用的是OpenAI，请改为 gpt-3.5-turbo
                        messages: [
                            { role: "system", content: "你是一个有用且简洁的AI助手。" },
                            { role: "user", content: text }
                        ],
                        temperature: 0.7
                    })
                });

                const data = await response.json();

                // 4. 检查响应状态
                if (!response.ok) {
                    throw new Error(data.error ? data.error.message : `请求失败(${response.status})`);
                }

                // 5. 更新界面内容
                if (data.choices && data.choices.length > 0) {
                    aiMsgDiv.innerText = data.choices[0].message.content;
                } else {
                    throw new Error("未收到有效的回复内容");
                }

            } catch (error) {
                aiMsgDiv.innerText = "❌ 错误: " + error.message;
                aiMsgDiv.style.color = "#dc2626"; // 变红显示
                console.error("Debug info:", error);
            }
        }

        // 辅助函数：创建消息气泡
        function appendMessage(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = role === 'user' ? 'flex justify-end' : 'flex justify-start';
            
            const msg = document.createElement('div');
            msg.className = role === 'user' ? 'user-msg px-4 py-3 max-w-[85%] shadow-md' : 'ai-msg px-4 py-3 max-w-[85%] shadow-sm';
            msg.innerText = text;
            
            wrapper.appendChild(msg);
            chatBox.appendChild(wrapper);
            
            // 自动滚动到底部
            chatBox.scrollTop = chatBox.scrollHeight;
            return msg;
        }

        // 支持回车发送
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
