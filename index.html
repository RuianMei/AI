<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 AI 助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-container { height: calc(100vh - 160px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col h-screen">

    <header class="bg-white shadow-sm py-4 px-6">
        <h1 class="text-xl font-bold text-gray-800">🚀 My GitHub AI</h1>
    </header>

    <main id="chat-box" class="chat-container overflow-y-auto p-6 space-y-4 flex-1">
        <div class="flex justify-start">
            <div class="bg-white border border-gray-200 rounded-2xl px-4 py-2 max-w-[80%] shadow-sm">
                你好！我是你的 AI 助手，有什么我可以帮你的吗？
            </div>
        </div>
    </main>

    <footer class="p-4 bg-white border-t border-gray-200">
        <div class="max-w-4xl mx-auto flex gap-2">
            <input type="text" id="user-input" placeholder="输入消息..." 
                class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="sendMessage()" 
                class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">
                发送
            </button>
        </div>
    </footer>

<script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        
        // 1. 在这里填入你的配置
        const API_URL = "https://api.deepseek.com/v1/chat/completions"; 
        const API_KEY = "你的真实API_KEY填在这里"; 

        // 2. 这里就是你刚才问的那段代码，它负责处理发送和接收
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            userInput.value = '';

            const aiMsgDiv = appendMessage('ai', "正在思考...");

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat", 
                        messages: [
                            { role: "system", content: "你是一个有用的助手。" },
                            { role: "user", content: text }
                        ]
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error ? data.error.message : `状态码: ${response.status}`);
                }

                if (data.choices && data.choices.length > 0) {
                    aiMsgDiv.innerText = data.choices[0].message.content;
                } else {
                    throw new Error("API 返回数据格式异常");
                }

            } catch (error) {
                aiMsgDiv.innerText = "❌ 出错了: " + error.message;
                aiMsgDiv.classList.add('text-red-500');
                console.error("详细错误日志:", error);
            }
        }

        // 3. 这个辅助函数负责把文字变成气泡显示在屏幕上
        function appendMessage(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = role === 'user' ? 'flex justify-end' : 'flex justify-start';
            
            const msg = document.createElement('div');
            msg.className = role === 'user' 
                ? 'bg-blue-600 text-white rounded-2xl px-4 py-2 max-w-[80%] shadow-md' 
                : 'bg-white border border-gray-200 rounded-2xl px-4 py-2 max-w-[80%] shadow-sm';
            msg.innerText = text;
            
            wrapper.appendChild(msg);
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
            return msg; 
        }

        // 4. 监听回车键
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
