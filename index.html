<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 GitHub AI 助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-container { height: calc(100vh - 180px); }
        .user-msg { background-color: #2563eb; color: white; border-radius: 1rem 1rem 0 1rem; }
        .ai-msg { background-color: white; color: #1f2937; border-radius: 1rem 1rem 1rem 0; border: 1px solid #e5e7eb; shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="bg-gray-50 flex flex-col h-screen font-sans">

    <header class="bg-white border-b border-gray-200 py-4 px-6 flex justify-between items-center">
        <h1 class="text-xl font-bold text-blue-600 tracking-tight">AI Assistant</h1>
        <span class="text-xs text-gray-400">Powered by DeepSeek / OpenAI</span>
    </header>

    <main id="chat-box" class="chat-container overflow-y-auto p-4 md:p-8 space-y-6 flex-1">
        <div class="flex justify-start">
            <div class="ai-msg px-4 py-3 max-w-[85%] shadow-sm">
                你好！我已经准备好为你服务了。请输入你的问题。
            </div>
        </div>
    </main>

    <footer class="p-4 bg-white border-t border-gray-200">
        <div class="max-w-4xl mx-auto flex gap-3">
            <input type="text" id="user-input" placeholder="输入消息..." 
                class="flex-1 border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            <button onclick="sendMessage()" 
                class="bg-blue-600 text-white px-6 py-3 rounded-xl hover:bg-blue-700 font-medium transition-colors shadow-lg active:scale-95">
                发送
            </button>
        </div>
        <p class="text-center text-[10px] text-gray-400 mt-2">请确保已在代码中配置有效的 API Key</p>
    </footer>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');

    // --- 硅基流动专用配置 ---
    // 1. 填入你复制的那串长字符（不管有没有 sk-，直接填进去）
    const MY_KEY = "sk-dcboxzwcrcnalteumoxfwgxaqzurqxkaelhotrfcsivgacln".trim(); 
    const API_URL = "https://api.siliconflow.cn/v1/chat/completions"; 

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage('user', text);
        userInput.value = '';

        const aiMsgDiv = appendMessage('ai', "正在思考中...");

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    // 重点：Bearer 后面一定要有空格！
                    "Authorization": `Bearer ${MY_KEY}`
                },
                body: JSON.stringify({
                    // 使用硅基流动目前最推荐的免费模型之一
                    model: "deepseek-ai/DeepSeek-V3", 
                    messages: [
                        { role: "user", content: text }
                    ],
                    temperature: 0.7
                })
            });

            // 获取返回的 JSON 数据
            const data = await response.json();

            // 如果报错了，直接把错误内容甩出来
            if (!response.ok) {
                console.error("API 返回了错误:", data);
                throw new Error(data.error ? data.error.message : `HTTP错误 ${response.status}`);
            }

            // 显示 AI 的回答
            if (data.choices && data.choices[0].message) {
                aiMsgDiv.innerText = data.choices[0].message.content;
            } else {
                throw new Error("返回数据格式不正确");
            }

        } catch (error) {
            aiMsgDiv.innerText = "❌ 错误: " + error.message;
            aiMsgDiv.classList.add('text-red-500');
            console.error("调试详情:", error);
        }
    }

    // 辅助函数：显示消息
    function appendMessage(role, text) {
        const wrapper = document.createElement('div');
        wrapper.className = role === 'user' ? 'flex justify-end' : 'flex justify-start';
        const msg = document.createElement('div');
        msg.className = role === 'user' 
            ? 'bg-blue-600 text-white rounded-2xl px-4 py-2 max-w-[85%] shadow-md' 
            : 'bg-white border border-gray-200 rounded-2xl px-4 py-2 max-w-[85%] shadow-sm';
        msg.innerText = text;
        wrapper.appendChild(msg);
        chatBox.appendChild(wrapper);
        chatBox.scrollTop = chatBox.scrollHeight;
        return msg;
    }

    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
